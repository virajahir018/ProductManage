<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="container">

        <h1 align="center">Product Management System</h1>

        <form id="addCard" class="addCard">

            <h2 align="center">Add Product</h2>
            <div class="name-price">
                <input  id="name" type="text" placeholder="Product Name">
                <input id="iPrice" type="number" placeholder="Price">
            </div>

            <div class="category-choose">
                <input id="iCategory" type="text" placeholder="Category">
                <input id="url" type="text" placeholder="Enter Image URL or Base64">
            </div>

            <div class="buttons">
                <button type="submit" class="addProduct">Add Product</button>
                <button type="reset" class="reset">Reset</button>
            </div>
        </form>


        <!-- update -->


        <form class="addCard" id="uaddCard"  style="display: none;">

            <h2 align="center">Update Product</h2>

            <div class="name-price">

                <input  id="uname" type="text" placeholder="Product Name">
                <input id="uiPrice" type="number" placeholder="Price">
            </div>

            <div class="category-choose">

                <input id="uiCategory" type="text" placeholder="Category">
                <input id="uurl" type="text" placeholder="Enter Image URL or Base64">
            </div>

            <div class="buttons">
                
                <button type="submit" class="addProduct">Add Product</button>
                <button type="reset" class="reset">Reset</button>
            </div>
        </form>


        <h2 class="plist">Product List</h2>

        <div class="listCard"></div>
    </div>
    <script src="srcipt.js"></script>
</body>

</html>
